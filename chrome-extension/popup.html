<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sourcewave</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <p class="eyebrow">Sourcewave</p>
      <h1>Turn this page into a podcast briefing.</h1>
      <p class="copy">
        We will open Sourcewave Studio with the current tab prefilled so you can review the answer
        before rendering audio.
      </p>

      <section class="source-card" aria-live="polite">
        <p class="label">Current page</p>
        <p class="domain" id="page-domain">Checking active tab...</p>
        <p class="url" id="page-url"></p>
      </section>

      <p class="status" id="status-message"></p>

      <button id="create-button" type="button">Create podcast</button>

      <p class="footnote">Public HTTP(S) pages only for the first release.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
